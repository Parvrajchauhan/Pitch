version: "3.9"

services:
  backend:
    build: ./server
    container_name: pitch-backend
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    restart: always

  frontend:
    build: ./client
    container_name: pitch-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always